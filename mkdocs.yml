site_name: suitesparse-graphblas
site_url: https://michelp.github.io/python-suitesparse-graphblas/
repo_url: https://github.com/michelp/python-suitesparse-graphblas

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            allow_inspection: false
            show_source: false
            docstring_style: numpy
            show_docstring_examples: true
            members_order: source
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2

nav:
  - Home: index.md
  - API Reference:
    - Matrix: api/matrix.md
    - Vector: api/vector.md
    - Scalar: api/scalar.md
    - Iterator: api/iterator.md
    - Context: api/context.md
    - Type: api/grb_type.md
    - UnaryOp: api/unaryop.md
    - BinaryOp: api/binaryop.md
    - IndexUnaryOp: api/indexunaryop.md
    - IndexBinaryOp: api/indexbinaryop.md
    - Monoid: api/monoid.md
    - Semiring: api/semiring.md
    - Descriptor: api/descriptor.md
    - SelectOp: api/selectop.md
    - Container: api/container.md
    - Global Options: api/global_options.md
    - Global: api/global_.md
    - IO: api/io.md
